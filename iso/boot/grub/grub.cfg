# Ekran çözünürlüğünü ayarla (VBE desteği için)
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

# Kullanıcıya 1 saniye düşünme payı ver (Hata ayıklamak için kritik)
set timeout=1
set default=0

menuentry "BNU/Blex" {
    multiboot /boot/mykernel.bin
    boot
}

menuentry "System Reboot" {
    reboot
}

menuentry "System Shutdown" {
    halt
}